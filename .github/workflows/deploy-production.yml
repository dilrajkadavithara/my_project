name: 🚀 Deploy to Production (Debug Mode)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Frontend and Backend to Production (Debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}

      - name: Deploy and Build on Production Server with Debug
        env:
          SSH_USER: dilrajkr
          SSH_HOST: joscarcare.com
          PROJECT_ROOT: /opt/JCC
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST <<ENDSSH
            set -e

            echo "=== DEBUG: Starting deployment ==="

            echo "=== DEBUG: Current directory ==="
            pwd

            echo "=== DEBUG: List files at current directory ==="
            ls -la

            echo "=== DEBUG: Check .git directory ==="
            ls -la .git

            echo "=== DEBUG: Git status ==="
            git status

            echo "=== DEBUG: Now git fetch and reset ==="
            cd $PROJECT_ROOT
            git fetch origin
            git reset --hard origin/main

            echo "=== BACKEND: Install dependencies ==="
            cd backend
            source .venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "=== BACKEND: Run migrations ==="
            python manage.py migrate --noinput

            echo "=== BACKEND: Collect static files ==="
            python manage.py collectstatic --noinput

            echo "=== FRONTEND: Install npm dependencies and build ==="
            cd ../frontend
            npm install
            npm run build

            echo "=== RESTART GUNICORN ==="
            sudo systemctl restart gunicorn

            echo "=== Deployment completed successfully ==="
          ENDSSH
